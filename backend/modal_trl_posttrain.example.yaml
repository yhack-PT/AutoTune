# Edit this file and run:
# modal run backend/modal_trl_posttrain.py --config backend/modal_trl_posttrain.example.yaml

trainer_type: sft
base_model: Qwen/Qwen3.5-9B-Base
base_model_revision: 2d021f1887f1fe402bf2c53ed69d7f0fc4709ec9
dataset_name: trl-lib/Capybara
dataset_config:
train_split: train
eval_split:
output_name: qwen3.5-9b-sft
seed_artifact:

gpu_type: A10
max_length: 2048
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 1.0
max_steps: 5

use_peft: true
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

learning_rate:
beta: 0.1
logging_steps: 10
save_steps: 200
eval_steps: 200
merge_after_train: false
enable_wandb: false

# Preference-tuning note:
# For dpo / kto / orpo / cpo / bco, set trainer_type accordingly and point
# seed_artifact at a prior SFT adapter, for example:
# seed_artifact: /checkpoints/experiments/qwen3.5-9b-sft/final_adapter
